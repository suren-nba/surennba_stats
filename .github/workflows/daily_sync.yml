name: Daily NBA Team Stats Sync

on:
  schedule:
    # 每天北京时间凌晨 02:00 (对应 UTC 时间前一天 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上随时手动点击按钮立刻运行，方便调试

permissions:
  contents: write # 极为关键：赋予自动化脚本向你的仓库提交并修改 Excel 文件的写权限

jobs:
  run-scraper:
    runs-on: ubuntu-latest # 使用最新的 Linux 环境运行
    
    steps:
      - name: 步骤1：载入仓库代码
        uses: actions/checkout@v4

      - name: 步骤2：初始化 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 步骤3：安装第三方依赖库
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests

      - name: 步骤4：执行 Python 抓取脚本
        run: python team_stats.py

      - name: 步骤5：自动将生成的 Excel 数据提交回仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          # 检查是否有数据更新，有更新则提交，无更新则静默跳过，防止报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: 云端全自动同步球队数据" && git push)